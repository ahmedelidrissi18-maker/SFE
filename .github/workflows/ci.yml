name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  quality:
    name: Lint, Tests, Build, Smoke
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Unit tests
        run: npm test

      - name: Smoke tests V1 critical paths
        run: npm run test:smoke

      - name: Build
        run: npm run build

      - name: Start app for baseline load test
        run: |
          npm run start -- --hostname 127.0.0.1 --port 3000 > /tmp/next-start.log 2>&1 &
          for i in {1..30}; do
            if curl -sf http://127.0.0.1:3000/api/health > /dev/null; then
              echo "App is up"
              exit 0
            fi
            sleep 2
          done
          echo "App did not start in time"
          cat /tmp/next-start.log
          exit 1

      - name: Baseline load test (Artillery)
        run: npm run test:load:baseline
